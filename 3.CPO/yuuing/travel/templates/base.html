<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}旅行アルバム{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="{{ url_for('index') }}">
        <i class="bi bi-camera2"></i> 旅行アルバム
      </a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link" href="{{ url_for('trip_list') }}">
          <i class="bi bi-collection"></i> 旅行一覧
        </a>
        <a class="nav-link" href="{{ url_for('map_view') }}">
          <i class="bi bi-map"></i> 日本地図
        </a>
        <a class="nav-link" href="{{ url_for('index') }}">
          <i class="bi bi-cloud-upload"></i> アップロード
        </a>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    {% block content %}{% endblock %}
  </main>

  <footer class="text-center text-muted py-3 border-top">
    <small>旅行アルバム &mdash; 思い出を記録する</small>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
